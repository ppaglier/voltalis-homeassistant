networks:
  default:
    name: voltalis-homeassistant_default
    driver: bridge

volumes:
  ha_venv:
  ha_config:

services:
  voltalis-homeassistant:
    container_name: voltalis-homeassistant
    build:
      context: .
      target: dev
    restart: on-failure
    networks:
      default:
    ports:
      - 9123:8123
    volumes:
      - .:/app
      - ha_venv:/app/.venv
      - ha_config:/config
      - ./custom_components/voltalis:/config/custom_components/voltalis:ro
